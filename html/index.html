<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>ثبت فیدبک</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                turquoise: {
                  light: "#E6F6F5",
                  DEFAULT: "#00A896",
                  dark: "#008475",
                },
                orange: {
                  light: "#FFF3E6",
                  DEFAULT: "#FF7A00",
                  dark: "#E06B00",
                },
                charcoal: "#2D3748",
                bgLight: "#FAFAFA",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-brand-orange p-8 font-sans">
    <button
      onclick="handleLogout()"
      class="bg-red-500 hover:bg-red-600 text-white text-sm px-3 py-1.5 rounded transition font-medium"
    >
      خروج از حساب
    </button>
    <div
      class="max-w-md mx-auto bg-brand-turquoise-light p-6 rounded-lg shadow-md"
    >
      <h1 class="text-2xl font-bold mb-4 text-center text-brand-charcoal">
        ثبت فیدبک جدید
      </h1>

      <form id="feedbackForm" class="space-y-4">
        <div>
          <label class="text-brand-charcoal mb-2 text-sm font-medium"
            >عنوان:</label
          >
          <input
            type="text"
            id="title"
            required
            class="w-full bg-brand-orange-light border p-2 rounded focus:outline-none focus:ring-2 focus:ring-brand-turquoise-dark text-brand-charcoal"
          />
        </div>
        <div>
          <label class="text-brand-charcoal mb-2 text-sm font-medium"
            >متن پیام:</label
          >
          <textarea
            id="message"
            required
            rows="4"
            class="w-full bg-brand-orange-light border p-2 rounded focus:outline-none focus:ring-2 focus:ring-brand-turquoise-dark text-brand-charcoal"
          ></textarea>
        </div>
        <button
          type="submit"
          class="w-full bg-brand-turquoise text-brand-orange-light p-2 rounded hover:bg-brand-turquoise-dark"
        >
          ارسال فیدبک
        </button>
      </form>

      <p id="responseMsg" class="mt-4 text-center text-sm hidden"></p>
    </div>

    <script>
      document
        .getElementById("feedbackForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const title = document.getElementById("title").value;
          const message = document.getElementById("message").value;
          const msgEl = document.getElementById("responseMsg");

          try {
            const res = await fetch("http://127.0.0.1:8000/api/feedbacks/", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ title: title, message: message }),
            });

            if (res.ok) {
              msgEl.textContent = "فیدبک شما با موفقیت ثبت شد!";
              msgEl.className =
                "mt-4 text-center text-sm text-brand-turquoise block";
              document.getElementById("feedbackForm").reset();
            }
          } catch (error) {
            msgEl.textContent =
              "خطا در ارتباط با سرور. مطمئن شوید که بک‌اند روشن است.";
            msgEl.className =
              "mt-4 text-center text-sm text-brand-orange block";
          }
        });

      async function handleLogout() {
        await fetch("http://127.0.0.1:8000/api/auth/logout", {
          method: "POST",
        });
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
