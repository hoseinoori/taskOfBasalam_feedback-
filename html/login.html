<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ورود به سیستم فیدبک باسلام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                turquoise: {
                  light: "#E6F6F5",
                  DEFAULT: "#00A896",
                  dark: "#008475",
                },
                orange: {
                  light: "#FFF3E6",
                  DEFAULT: "#FF7A00",
                  dark: "#E06B00",
                },
                charcoal: "#2D3748",
                bgLight: "#FAFAFA",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-brand-orange h-screen flex items-center justify-center p-4">
    <div
      class="bg-brand-turquoise-light p-8 rounded-lg shadow-md w-full max-w-md border border-gray-100"
    >
      <h1 class="text-2xl font-bold text-brand-charcoal text-center mb-6">
        ورود به حساب کاربری
      </h1>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-brand-charcoal mb-1"
            >نام کاربری</label
          >
          <input
            type="text"
            id="username"
            required
            class="w-full bg-brand-orange-light border p-2 rounded focus:outline-none focus:ring-2 focus:ring-brand-turquoise"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-brand-charcoal mb-1"
            >رمز عبور</label
          >
          <input
            type="password"
            id="password"
            required
            class="w-full bg-brand-orange-light border p-2 rounded focus:outline-none focus:ring-2 focus:ring-brand-turquoise"
          />
        </div>

        <p id="msg" class="text-sm text-center font-medium hidden"></p>

        <button
          type="submit"
          class="w-full bg-brand-turquoise hover:bg-brand-turquoise-dark text-white p-2 rounded font-medium transition duration-200"
        >
          ورود
        </button>
      </form>

      <p class="text-sm text-gray-600 text-center mt-4">
        هنوز حساب کاربری ندارید؟
        <a
          href="signup.html"
          class="text-brand-turquoise font-bold hover:underline"
          >ثبت‌نام کنید</a
        >
      </p>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;
          const msgEl = document.getElementById("msg");

          try {
            const res = await fetch("http://127.0.0.1:8000/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, password }),
            });
            const data = await res.json();

            if (!res.ok) throw new Error(data.detail || "خطا در ورود");

            msgEl.className = "text-sm text-center font-medium text-green-600";
            msgEl.textContent = "ورود موفقیت‌آمیز بود! در حال انتقال...";
            msgEl.classList.remove("hidden");

            setTimeout(() => {
              if (data.is_admin) {
                window.location.href = "admin.html";
              } else {
                window.location.href = "index.html";
              }
            }, 1000);
          } catch (error) {
            msgEl.className = "text-sm text-center font-medium text-red-500";
            msgEl.textContent = error.message;
            msgEl.classList.remove("hidden");
          }
        });
    </script>
  </body>
</html>
